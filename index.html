<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hawaii Photo Movie｜往事余愁</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #111 0%, #050505 100%);
      color: #f4f0e8;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Mincho ProN", "Yu Mincho", serif;
      text-align: center;
    }
    .page {
      width: min(1100px, 94vw);
      margin: 0 auto;
      padding: 44px 0 56px;
    }
    .card {
      margin: 30px auto 52px;
      padding: 22px;
      border-radius: 22px;
      background: rgba(255,255,255,.04);
      box-shadow: 0 22px 70px rgba(0,0,0,.55);
    }
    .eyebrow {
      color: #c8ad6a;
      letter-spacing: .2em;
      font-size: .85rem;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-weight: 400;
      letter-spacing: .12em;
      font-size: clamp(2rem, 5vw, 3.6rem);
    }
    h2 {
      margin: 10px 0 22px;
      font-weight: 300;
      color: #d8c38a;
      font-size: clamp(1rem, 2.2vw, 1.35rem);
    }
    .lead {
      margin: 0 auto 24px;
      max-width: 760px;
      line-height: 1.8;
      color: #cfc8bb;
    }
    .slideshow {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 18px;
      background: #000;
    }
    .slideshow img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }
    .slideshow img.active {
      opacity: 1;
    }
    video {
      display: block;
      width: 100%;
      max-height: 78vh;
      border-radius: 18px;
      background: #000;
      box-shadow: 0 22px 70px rgba(0,0,0,.55);
    }
    .footer {
      margin-top: 22px;
      color: #9f9687;
      font-size: .9rem;
      letter-spacing: .08em;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="eyebrow">HAWAII MEMORY</div>
      <h1>Hawaii Photo Movie</h1>
      <h2>Photo Slideshow</h2>
      <p class="lead">大切なハワイの思い出を、写真のスライドショーとして。</p>
      <div class="slideshow" id="hawaiiSlideshow">
        <img src="photo01.jpg" class="active" alt="">
        <img src="photo02.jpg" alt="">
        <img src="photo03.jpg" alt="">
        <img src="photo04.jpg" alt="">
        <img src="photo05.jpg" alt="">
        <img src="photo06.jpg" alt="">
        <img src="photo07.jpg" alt="">
        <img src="photo08.jpg" alt="">
        <img src="photo09.jpg" alt="">
        <img src="photo10.jpg" alt="">
        <img src="photo11.jpg" alt="">
        <img src="photo12.jpg" alt="">
        <img src="photo13.jpg" alt="">
        <img src="photo14.jpg" alt="">
        <img src="photo15.jpg" alt="">
      </div>
    </section>

    <section class="card">
      <div class="eyebrow">A CINEMATIC MEMORY</div>
      <h1>往事余愁</h1>
      <h2>附視頻寄語</h2>
      <p class="lead">静かに残る記憶を、ひとつの映像作品として。</p>
      <video controls playsinline preload="metadata">
        <source src="wakarenoyokan_full.mp4" type="video/mp4" />
        お使いのブラウザでは動画を再生できません。
      </video>
    </section>

    <div class="footer">A quiet tribute to unforgettable memories.</div>
  </main>

  <script>
    const slides = document.querySelectorAll('#hawaiiSlideshow img');
    let current = 0;
    setInterval(() => {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, 4000);
  </script>
</body>
</html>
